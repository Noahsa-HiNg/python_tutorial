<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>20 Bài Lập Trình Thi Đấu – Chủ đề Vận tốc</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 40px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .search {
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        .problem {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .problem h2 {
            cursor: pointer;
            color: #1e6bd6;
        }

        .section {
            font-weight: bold;
            margin-top: 10px;
        }

        pre {
            background: #1e1e1e;
            color: #00ff9c;
            padding: 12px;
            border-radius: 6px;
        }

        .formula {
            background: #f4f8ff;
            border-left: 5px solid #1e6bd6;
            padding: 10px;
            margin-top: 10px;
            display: none;
        }

        .sample {
            display: none;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background: #1e6bd6;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #144fa0;
        }
    </style>

</head>

<body>

    <h1>20 Bài Lập Trình Thi Đấu – Chủ đề Vận tốc</h1>

    <div class="search">
        <input id="searchBox" placeholder="Tìm bài..." onkeyup="searchProblem()">
    </div>

    <div id="container"></div>

    <script>

        const problems = [

            {
                title: "Bài 1 – Tính quãng đường",
                desc: `Một chiếc xe đang di chuyển trên đường thẳng.

Xe chạy với vận tốc v kilomet mỗi giờ (km/h). 
Điều này có nghĩa là trong 1 giờ chiếc xe sẽ đi được v kilomet.

Chiếc xe chạy liên tục trong t giờ.

Hãy viết chương trình tính quãng đường S mà chiếc xe đi được sau t giờ di chuyển.`,
                formula: "S = v × t",
                input: "v t",
                output: "S",
                sampleIn: "10 3",
                sampleOut: "30"
            },

            {
                title: "Bài 2 – Tính vận tốc",
                desc: `Một chiếc xe đi từ thành phố A đến thành phố B.

Tổng quãng đường xe đi được là S kilomet.
Xe hoàn thành chuyến đi trong t giờ.

Vận tốc cho biết trong 1 giờ xe đi được bao nhiêu kilomet.

Hãy tính vận tốc trung bình v của chiếc xe.`,
                formula: "v = S / t",
                input: "S t",
                output: "v",
                sampleIn: "60 3",
                sampleOut: "20"
            },

            {
                title: "Bài 3 – Tính thời gian",
                desc: `Một chiếc xe cần đi quãng đường S kilomet.

Xe chạy với vận tốc v kilomet mỗi giờ.

Hãy tính xem chiếc xe cần bao nhiêu giờ để đi hết quãng đường đó.`,
                formula: "t = S / v",
                input: "S v",
                output: "t",
                sampleIn: "120 60",
                sampleOut: "2"
            },

            {
                title: "Bài 4 – Quãng đường theo phút",
                desc: `Một chiếc xe chạy với vận tốc v km/h.

Tuy nhiên xe chỉ chạy trong m phút thay vì chạy theo giờ.

Biết rằng:
1 giờ = 60 phút.

Hãy tính quãng đường S mà xe đi được.`,
                formula: "S = v × (m / 60)",
                input: "v m",
                output: "S",
                sampleIn: "60 30",
                sampleOut: "30"
            },

            {
                title: "Bài 5 – Tổng quãng đường",
                desc: `Một người đi du lịch qua hai chặng đường.

Chặng thứ nhất người đó đi được S1 kilomet.
Chặng thứ hai người đó đi thêm S2 kilomet.

Hãy tính tổng quãng đường S mà người đó đã đi.`,
                formula: "S = S1 + S2",
                input: "S1 S2",
                output: "S",
                sampleIn: "20 30",
                sampleOut: "50"
            },

            {
                title: "Bài 6 – Tổng thời gian",
                desc: `Một người di chuyển qua hai chặng đường khác nhau.

Chặng thứ nhất mất t1 giờ.
Chặng thứ hai mất t2 giờ.

Hãy tính tổng thời gian di chuyển của người đó.`,
                formula: "t = t1 + t2",
                input: "t1 t2",
                output: "t",
                sampleIn: "2 3",
                sampleOut: "5"
            },

            {
                title: "Bài 7 – Xe chạy hai giai đoạn",
                desc: `Một chiếc xe chạy trong hai giai đoạn.

Giai đoạn 1:
Xe chạy với vận tốc v1 km/h trong t1 giờ.

Giai đoạn 2:
Xe chạy với vận tốc v2 km/h trong t2 giờ.

Hãy tính tổng quãng đường S mà chiếc xe đã đi.`,
                formula: "S = v1*t1 + v2*t2",
                input: "v1 t1 / v2 t2",
                output: "S",
                sampleIn: "10 2 | 20 3",
                sampleOut: "80"
            },

            {
                title: "Bài 8 – So sánh vận tốc",
                desc: `Có hai người A và B cùng chạy bộ.

Người A chạy được S1 kilomet trong t1 giờ.
Người B chạy được S2 kilomet trong t2 giờ.

Hãy tính vận tốc của mỗi người và cho biết ai chạy nhanh hơn.

Nếu vận tốc của A lớn hơn B in ra A>B.
Nếu vận tốc của B lớn hơn A in ra B>A.
Nếu hai người chạy nhanh như nhau in ra A=B.`,
                formula: "v = S / t",
                input: "S1 t1 / S2 t2",
                output: "A>B, B>A hoặc A=B",
                sampleIn: "10 2 | 12 3",
                sampleOut: "A>B"
            },

            {
                title: "Bài 9 – Hai xe cùng chiều",
                desc: `Hai chiếc xe xuất phát cùng lúc và chạy cùng chiều trên một con đường.

Xe thứ nhất chạy với vận tốc v1 km/h.
Xe thứ hai chạy với vận tốc v2 km/h.

Sau t giờ hãy tính khoảng cách giữa hai xe.`,
                formula: "d = (v1 − v2) × t",
                input: "v1 v2 t",
                output: "d",
                sampleIn: "60 40 2",
                sampleOut: "40"
            },

            {
                title: "Bài 10 – Hai xe ngược chiều",
                desc: `Hai chiếc xe xuất phát từ cùng một vị trí và chạy theo hai hướng ngược nhau.

Xe thứ nhất có vận tốc v1.
Xe thứ hai có vận tốc v2.

Sau t giờ hãy tính khoảng cách giữa hai xe.`,
                formula: "d = (v1 + v2) × t",
                input: "v1 v2 t",
                output: "d",
                sampleIn: "40 60 2",
                sampleOut: "200"
            },

            {
                title: "Bài 11 – Thời gian gặp nhau",
                desc: `Hai chiếc xe ở hai điểm khác nhau và cách nhau S kilomet.

Hai xe bắt đầu chạy về phía nhau.

Xe thứ nhất có vận tốc v1 km/h.
Xe thứ hai có vận tốc v2 km/h.

Hãy tính thời gian để hai xe gặp nhau.`,
                formula: "t = S / (v1 + v2)",
                input: "S v1 v2",
                output: "t",
                sampleIn: "120 40 20",
                sampleOut: "2"
            },

            {
                title: "Bài 12 – Quãng đường còn lại",
                desc: `Một chiếc xe cần đi tổng quãng đường S kilomet.

Sau khi chạy với vận tốc v trong t giờ, chiếc xe đã đi được một phần quãng đường.

Hãy tính quãng đường còn lại mà chiếc xe phải đi.`,
                formula: "S2 = S − v*t",
                input: "S v t",
                output: "S2",
                sampleIn: "100 20 3",
                sampleOut: "40"
            },

            {
                title: "Bài 13 – Tăng vận tốc",
                desc: `Một chiếc xe đang chạy với vận tốc v km/h.

Sau đó người lái xe tăng thêm a km/h vào vận tốc.

Hãy tính vận tốc mới của chiếc xe.`,
                formula: "v2 = v + a",
                input: "v a",
                output: "v2",
                sampleIn: "40 10",
                sampleOut: "50"
            },

            {
                title: "Bài 14 – Giảm vận tốc",
                desc: `Một chiếc xe đang chạy với vận tốc v km/h.

Sau đó người lái xe giảm vận tốc đi a km/h.

Hãy tính vận tốc mới của chiếc xe.`,
                formula: "v2 = v − a",
                input: "v a",
                output: "v2",
                sampleIn: "40 5",
                sampleOut: "35"
            },

            {
                title: "Bài 15 – Tổng vận tốc",
                desc: `Có hai phương tiện di chuyển.

Phương tiện thứ nhất có vận tốc v1 km/h.
Phương tiện thứ hai có vận tốc v2 km/h.

Hãy tính tổng vận tốc của hai phương tiện.`,
                formula: "v = v1 + v2",
                input: "v1 v2",
                output: "v",
                sampleIn: "20 30",
                sampleOut: "50"
            },

            {
                title: "Bài 16 – Hiệu vận tốc",
                desc: `Có hai phương tiện di chuyển với vận tốc khác nhau.

Phương tiện thứ nhất có vận tốc v1.
Phương tiện thứ hai có vận tốc v2.

Hãy tính độ chênh lệch vận tốc giữa hai phương tiện.`,
                formula: "v = |v1 − v2|",
                input: "v1 v2",
                output: "v",
                sampleIn: "50 20",
                sampleOut: "30"
            },

            {
                title: "Bài 17 – Quãng đường nhiều giờ",
                desc: `Một chiếc xe chạy liên tục với vận tốc v km/h.

Xe chạy trong t giờ.

Hãy tính tổng quãng đường xe đã đi.`,
                formula: "S = v × t",
                input: "v t",
                output: "S",
                sampleIn: "15 4",
                sampleOut: "60"
            },

            {
                title: "Bài 18 – Tổng quãng đường nhiều chặng",
                desc: `Một người đi qua ba chặng đường khác nhau.

Chặng thứ nhất dài S1 km.
Chặng thứ hai dài S2 km.
Chặng thứ ba dài S3 km.

Hãy tính tổng quãng đường mà người đó đã đi.`,
                formula: "S = S1 + S2 + S3",
                input: "S1 S2 S3",
                output: "S",
                sampleIn: "10 20 30",
                sampleOut: "60"
            },

            {
                title: "Bài 19 – Vận tốc trung bình",
                desc: `Một chiếc xe đi hai chặng đường.

Chặng 1:
đi S1 km trong t1 giờ.

Chặng 2:
đi S2 km trong t2 giờ.

Hãy tính vận tốc trung bình của cả chuyến đi.`,
                formula: "v = (S1+S2)/(t1+t2)",
                input: "S1 t1 / S2 t2",
                output: "v",
                sampleIn: "20 1 | 30 2",
                sampleOut: "16.67"
            },

            {
                title: "Bài 20 – Tổng quãng đường nhiều xe",
                desc: `Có bốn chiếc xe khác nhau.

Xe 1 đi được S1 km.
Xe 2 đi được S2 km.
Xe 3 đi được S3 km.
Xe 4 đi được S4 km.

Hãy tính tổng quãng đường mà tất cả các xe đã đi.`,
                formula: "S = S1 + S2 + S3 + S4",
                input: "S1 S2 S3 S4",
                output: "S",
                sampleIn: "10 20 30 40",
                sampleOut: "100"
            }

        ];


        function createProblems() {

            const container = document.getElementById("container");

            problems.forEach((p, i) => {

                container.innerHTML += `

<div class="problem">

<h2 onclick="toggle(this)"> ${p.title} </h2>

<div class="content">

<div class="section">Mô tả</div>
<p>${p.desc}</p>

<button onclick="showFormula(this)">Hiện công thức</button>

<div class="formula">${p.formula}</div>

<div class="section">Input</div>
<pre>${p.input}</pre>

<div class="section">Output</div>
<pre>${p.output}</pre>

<button onclick="showSample(this)">Sample</button>

<div class="sample">

<div class="section">Sample Input</div>
<pre>${p.sampleIn}</pre>

<div class="section">Sample Output</div>
<pre>${p.sampleOut}</pre>

</div>

</div>

</div>

`;

            });

        }

        createProblems();


        function showFormula(btn) {

            const f = btn.nextElementSibling;

            f.style.display = f.style.display === "block" ? "none" : "block";

        }

        function showSample(btn) {

            const s = btn.nextElementSibling;

            s.style.display = s.style.display === "block" ? "none" : "block";

        }

        function toggle(title) {

            const content = title.nextElementSibling;

            content.style.display = content.style.display === "none" ? "block" : "none";

        }

        function searchProblem() {

            const text = document.getElementById("searchBox").value.toLowerCase();

            const items = document.querySelectorAll(".problem");

            items.forEach(p => {

                p.style.display = p.innerText.toLowerCase().includes(text) ? "block" : "none";

            });

        }

    </script>

</body>

</html>
